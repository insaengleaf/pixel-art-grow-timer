<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Study & Grow</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>PIXEL STUDY</h1>
            <button id="open-inventory-btn" class="icon-btn">📖 MY PLANTS</button>
        </header>

        <main>
            <!-- [화면 1] 설정 섹션 -->
            <section id="setup-area" class="card">
                <h2>TIMER SETTING</h2>
                <div class="timer-setting-container">
                    <div class="time-box">
                        <button class="arrow-btn" onclick="adjustTime('min', 1)">▲</button>
                        <input type="number" id="min-input" class="pixel-input" value="25" min="0" max="99">
                        <button class="arrow-btn" onclick="adjustTime('min', -1)">▼</button>
                        <span class="label">MIN</span>
                    </div>
                    <div class="separator">:</div>
                    <div class="time-box">
                        <button class="arrow-btn" onclick="adjustTime('sec', 1)">▲</button>
                        <input type="number" id="sec-input" class="pixel-input" value="00" min="0" max="59">
                        <button class="arrow-btn" onclick="adjustTime('sec', -1)">▼</button>
                        <span class="label">SEC</span>
                    </div>
                </div>
                <button id="start-btn" class="big-btn">START FOCUS</button>
            </section>

            <!-- [화면 2] 집중 섹션 (기본 숨김) -->
            <section id="focus-area" class="card hidden">
                <div class="plant-stage-container">
                    <img id="plant-image" src="" alt="Plant">
                    <p id="status-text">Loading...</p>
                </div>
                <div id="timer-display">00:00</div>
                <div class="controls-row">
                    <button id="pause-btn" class="control-btn">STOP</button>
                    <button id="giveup-btn" class="danger-btn">GIVE UP</button>
                </div>
            </section>
        </main>

        <!-- [화면 3] 도감 모달 -->
        <div id="inventory-modal" class="modal hidden">
            <div class="modal-content card">
                <span id="close-inventory-btn" class="close-btn">&times;</span>
                <h2>PLANT COLLECTION</h2>
                <div id="inventory-list" class="inventory-grid"></div>
                <p id="empty-msg" class="hidden">No plants collected yet!</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
